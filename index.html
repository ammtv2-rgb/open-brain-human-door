<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Brain Human Door</title>
 <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>Open Brain</h1>
      <p class="subtitle">Morning scan for your public.memories table</p>
    </header>

    <section class="dashboard-counters">
      <button class="counter-card dashboard-filter-card active" id="cardAll" data-filter="all" type="button">
        <div class="counter-label">Total memories</div>
        <div class="counter-value" id="totalMemoriesCount">0</div>
      </button>

      <button class="counter-card dashboard-filter-card" id="cardOpen" data-filter="open" type="button">
        <div class="counter-label">Open loops</div>
        <div class="counter-value" id="openLoopsCount">0</div>
      </button>

      <button class="counter-card dashboard-filter-card" id="cardNeutral" data-filter="neutral" type="button">
        <div class="counter-label">Neutral</div>
        <div class="counter-value" id="neutralCount">0</div>
      </button>

      <button class="counter-card dashboard-filter-card" id="cardClosed" data-filter="closed" type="button">
        <div class="counter-label">Closed</div>
        <div class="counter-value" id="closedCount">0</div>
      </button>
    </section>

    <section class="capture-section">
      <div class="section-header">
        <h2>Quick capture</h2>
      </div>

      <textarea
        id="captureInput"
        class="capture-textarea"
        rows="5"
        placeholder="Type or speak your thought here..."
      ></textarea>

      <div class="capture-controls">
        <select id="typeSelect" class="type-select">
          <option value="note">note</option>
          <option value="task">task</option>
          <option value="idea">idea</option>
          <option value="reminder">reminder</option>
        </select>

        <button id="saveMemoryBtn" class="primary-btn">Save Memory</button>
      </div>

      <p class="helper-text">
        Fast capture for desktop and iPhone. Use voice dictation on your phone keyboard if you want to speak instead of type.
      </p>
    </section>

    <section class="search-wrap">
      <input
        id="searchInput"
        type="text"
        placeholder="Search anything: thoughts, people, topics, action items..."
      />
    </section>

    <section class="priority-section">
      <div class="section-header">
        <h2>Open action items</h2>
        <button id="refreshBtn" class="ghost-btn">Refresh</button>
      </div>
      <div id="priorityList" class="card-list"></div>
    </section>

    <section class="all-section">
      <div class="section-header">
        <h2>All memories</h2>
      </div>
      <div id="memoryList" class="card-list"></div>
    </section>
  </div>

  <div id="editModal" class="modal hidden">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3>Edit memory</h3>
        <button id="closeModalBtn" class="icon-btn">✕</button>
      </div>

      <div class="modal-body">
        <label>Content</label>
        <textarea id="editContent" rows="5"></textarea>

        <label>People (comma separated)</label>
        <input id="editPeople" type="text" />

        <label>Topics (comma separated)</label>
        <input id="editTopics" type="text" />

        <label>Action items (comma separated)</label>
        <textarea id="editActionItems" rows="3"></textarea>

        <label>Type</label>
        <input id="editType" type="text" />
      </div>

      <div class="modal-footer">
        <button id="saveBtn" class="primary-btn">Save changes</button>
      </div>
    </div>
  </div>

<script type="module" src="app.js?v=6"></script>
</body>
</html>
